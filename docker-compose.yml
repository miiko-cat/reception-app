services:
  # データベースの設定
  db:
    image: postgres:15
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data  # ★データの永続化設定！コンテナを消してもデータが残ります
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}

  # Djangoアプリの設定
  web:
    build: .
    restart: unless-stopped
    # コンテナ起動時に「静的ファイルの集約」「マイグレーション」「起動」を自動で連続実行します
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             python manage.py migrate &&
             gunicorn reception_app.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - .:/code
    ports:
      - "80:8000"  # サーバーの80番（通常のWebアクセス）をDjangoの8000番に繋ぐ
    depends_on:
      - db
    env_file:
      - .env

volumes:
  postgres_data: