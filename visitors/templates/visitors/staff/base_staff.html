<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}来訪者一覧{% endblock %}</title>
    <!-- 日本語フォント -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap"
        rel="stylesheet"
    />

    <style>
        body {
            font-family: "Segoe UI", "Noto Sans JP", sans-serif;
            font-size: 12px;
            margin: 0;
            background: #f3f3f3;
        }
        .sheet-toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            background: #217346; /* Excel っぽい緑 */
            color: #fff;
            font-size: 13px;
        }
        .sheet-wrap {
            overflow: auto;
            max-height: calc(100vh - 48px);
            background: #fff;
        }
          
        .excel-sheet {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }
          
        .excel-sheet th,
        .excel-sheet td {
            border: 1px solid #d4d4d4;
            padding: 4px 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
          
        .header-row th {
            background: #e2efda;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 2;
        }
        
        .filter-row th {
            background: #f9f9f9;
            position: sticky;
            top: 29px; /* ヘッダー行の高さに合わせる */
            z-index: 2;
            padding: 2px 10px 2px 4px;
        }
        
        .filter-row input {
            width: 100%;
            font-size: 12px;
            padding: 2px 4px;
            border: 1px solid #bbb;
            margin: 0;
            box-sizing: border-box;
        }

        /* === 値が入ったフィルター入力のハイライト === */
        .filter-row input.has-value {
            border-color: #217346;
            background-color: #eaf5ee;
        }

        /* === 検索中ローディング === */
        #visitor-tbody.is-loading {
            opacity: 0.35;
            pointer-events: none;
        }

        /* 受付日時フィルターセル：縦積みにして ... を消す */
        .date-filter {
            overflow: visible;
            text-overflow: clip;
        }
        .date-filter input[type="date"] {
            display: block;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 2px;
        }

        /* === 日付フィルター From/To ラベル === */
        .date-range-item {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 2px;
        }
        .date-range-item:last-child { margin-bottom: 0; }

        .date-range-label {
            font-size: 10px;
            color: #888;
            min-width: 22px;
            text-align: right;
            flex-shrink: 0;
        }
        
        .excel-sheet tbody tr:nth-child(even) {
            background: #fafafa;
        }
        
        .excel-sheet tbody tr:hover {
            background: #fff2cc; /* Excel の選択行っぽい黄色 */
        }
        
        .col-no {
            width: 40px;
            text-align: center;
            background: #f3f3f3;
            color: #666;
        }
        
        .datetime {
            text-align: center;
            font-variant-numeric: tabular-nums;
        }
        
        .empty {
            text-align: center;
            color: #888;
            padding: 24px;
        }
        
        /* ── ツールバー固定 ── */
        .sheet-toolbar {
            position: sticky;
            top: 0;
            z-index: 10;
        }

        /* ── 絞込み中バッジ ── */
        .filter-badge {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.35);
            border-radius: 10px;
            padding: 1px 8px;
            font-size: 11px;
            display: none;
        }
        .filter-badge.visible { display: inline; }

        /* ── CSVエクスポートボタン ── */
        .btn-export {
            padding: 3px 10px;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 3px;
            color: #fff;
            font-size: 12px;
            text-decoration: none;
            white-space: nowrap;
            transition: background 0.15s;
        }
        .btn-export:hover { background: rgba(255,255,255,0.28); color: #fff; }

        /* ── フィルター有効列のヘッダー強調 ── */
        .header-row th.col-filtered { background: #b7d7a8; }
        .header-row th.col-filtered a { color: #1a5c35; font-weight: 700; }

        /* ── × クリアボタン付きラッパー ── */
        .filter-cell {
            position: relative;
            display: flex;
            align-items: center;
        }
        .filter-cell input { flex: 1; padding-right: 18px; }
        .clear-btn {
            position: absolute;
            right: 3px;
            background: none;
            border: none;
            cursor: pointer;
            color: #aaa;
            font-size: 13px;
            padding: 0;
            line-height: 1;
            display: none;
            user-select: none;
        }
        .clear-btn.visible { display: block; }
        .clear-btn:hover { color: #555; }

        /* ── 日付 From/To ラベル ── */
        .date-range-item {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 2px;
        }
        .date-range-item:last-child { margin-bottom: 0; }
        .date-range-label {
            font-size: 10px;
            color: #888;
            min-width: 22px;
            text-align: right;
            flex-shrink: 0;
        }
        .date-filter { overflow: visible; }
        .date-filter input[type="date"] { display: block; width: 100%; box-sizing: border-box; }

        /* ── 入力済みフィルターのハイライト ── */
        .filter-row input.has-value { border-color: #217346; background: #eaf5ee; }

        /* ── 検索中ローディング ── */
        #visitor-tbody.is-loading { opacity: 0.35; pointer-events: none; }

        /* ── 空状態 ── */
        .empty { text-align: center; color: #888; padding: 32px; }
        .clear-all-btn {
            margin-left: 12px;
            padding: 4px 12px;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            color: #555;
        }
        .clear-all-btn:hover { background: #f5f5f5; }
    </style>
</head>
<body>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
